services:
  # PostgreSQL database
  db:
    image: postgres:17-alpine
    container_name: videoflix_database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql

  # Redis: background-job queue + cache
  redis:
    image: redis:latest
    container_name: videoflix_redis
    volumes:
      - redis_data:/data

  # Django backend (Gunicorn) + RQ worker, started by backend.entrypoint.sh
  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: videoflix_backend
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - videoflix_media:/app/media
      - videoflix_static:/app/static
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
  videoflix_media:
  videoflix_static:
