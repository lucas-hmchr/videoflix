<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm your email</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f7; font-family:Arial, Helvetica, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7; padding:40px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; max-width:600px; width:100%;">
        <tr>
          <td align="center" style="padding:40px 40px 24px 40px;">
            <img src="cid:logo" width="180" alt="Videoflix" style="display:block; width:180px; max-width:180px; height:auto; border:0;">
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px; font-size:16px; line-height:24px; color:#1a1a1a;">
            <p style="margin:0 0 16px 0;">Hello,</p>
            <p style="margin:0 0 24px 0;">Thank you for registering with <span style="color:#3547FF; font-weight:bold;">Videoflix</span>. To complete your registration and verify your email address, please click the link below:</p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding:0 40px 24px 40px;">
            <a href="{{ activation_link }}" style="background-color:#3547FF; color:#ffffff; text-decoration:none; font-size:16px; font-weight:bold; padding:16px 40px; border-radius:30px; display:inline-block;">Activate account</a>
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 8px 40px; font-size:16px; line-height:24px; color:#1a1a1a;">
            <p style="margin:0 0 24px 0;">If you did not create an account with us, please disregard this email.</p>
            <p style="margin:0;">Best regards,</p>
            <p style="margin:0 0 32px 0;">Your Videoflix Team.</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
